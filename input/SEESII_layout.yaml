        - "制造商信息"
        - "地址"
        - "日期"
        - "邮箱"
        - "代理商信息"
        - "Made in China"
      字体:
        正文: "New Frank Regular 10pt"
        重要标签: "New Frank Bold 10pt"
      隐性规则:
        - "联系信息应清晰分组"
        - "邮箱、电话、地址不得被断行到难以识别"
        - "Made in China通常置于底部"
        - "制造商与代理商信息应保持区块间距"

  图片布局规则:
    图片类型:
      产品线稿:
        用途:
          - "封面主图"
          - "部件示意"
          - "操作图"
        适配方式: "等比例完整显示"
        允许裁切: false
      操作示意图:
        用途:
          - "换向开关"
          - "速度调节"
          - "电池安装"
          - "钻孔操作"
        适配方式: "保持线稿和箭头可读"
        允许裁切: false
      图标:
        用途:
          - "警告图标"
          - "回收标识"
          - "方向箭头"
          - "页眉箭头装饰"
        适配方式: "固定高度或随文字行高缩放"

    图片通用属性:
      最大宽度: "内容安全区宽度"
      对齐方式: "居中"
      保持宽高比: true
      允许缩小: true
      允许放大: false
      允许裁切: false
      图片间距:
        图片前: "3mm-5mm"
        图片后: "3mm-5mm"

    图片与标题绑定:
      启用: true
      规则:
        - "图片紧跟标题时，图片与标题组成视觉组"
        - "标题移动、换行或分页时，关联图片同步移动"
        - "标题区域高度变化时，图片按剩余空间自适应缩放"
        - "图片不得上移覆盖标题、警告框或说明文字"

    图片与正文绑定:
      启用: true
      规则:
        - "正文引用图片编号时，图片应靠近引用位置"
        - "图片不应距离首次引用正文超过1页"
        - "图片编号说明必须与图片保持同页优先"
        - "图片出现在正文之前时，不应早于相关说明太多"

    隐性规则:
      - "图片必须避让页脚页码"
      - "图片与相关标题、说明文字应保持同页优先"
      - "图片中的箭头、文字、编号必须清晰可读"
      - "图片过大时优先等比例缩小"
      - "缩小后不可读时整体移至下一页"
      - "同一页面内同类图片尺寸尽量统一"

  表格布局规则:
    通用表格:
      宽度: "内容安全区宽度"
      边框: "黑色细实线"
      字体: "New Frank Regular 10pt"
      单元格内边距: "适中"
      垂直对齐: "居中"
    表格适配:
      列宽策略: "按内容自动分配"
      长文本处理: "允许换行"
      最小字号: "8pt"
      跨页:
        允许跨页: true
        表头重复: true
        行不可拆分: true
    隐性规则:
      - "表格不得超出页面安全区"
      - "表格标题必须与表格同页"
      - "页面底部不得只剩一行表头"
      - "参数名称和参数值应保持对应关系"
      - "表格过宽时优先压缩列宽"
      - "表格内容不得被裁切"

  内容流与分页规则:
    布局模式: "流式排版"
    自动分页: true
    阅读顺序: "从上到下，从左到右"
    孤行控制:
      启用: true
      页底最少行数: 2
      页顶最少行数: 2
    标题孤立控制:
      启用: true
      规则:
        - "标题不得单独出现在页面底部"
        - "标题后至少保留一段正文、一个图文块或一个警告框"
    同页保持:
      一级标题与后续内容: true
      二级标题与正文: true
      警告标题与警告内容: true
      警告框整体: true
      步骤编号与步骤正文: true
      图片与图注: true
      图片与编号说明: true
      表格标题与表格: true
      页码与正文内容分离: true

    分页优先级:
      优先分页位置:
        - "一级章节之前"
        - "完整警告框之前"
        - "完整图文组之前"
        - "参数表之前"
        - "操作步骤组之前"
      避免分页位置:
        - "标题之后"
        - "警告图标与警告正文之间"
        - "步骤编号与步骤正文之间"
        - "正文与对应图片之间"
        - "图片与编号说明之间"
        - "表格表头之后"
        - "页脚区域内部"

    页面平衡:
      启用: true
      规则:
        - "避免页面底部大面积空白"
        - "避免末页只有少量文字"
        - "允许通过图片缩放、行距微调、内容组前移来平衡页面"
        - "目录行距可在12pt-21pt范围内调整"
        - "正文行距可在11pt-15pt范围内调整，推荐12.5pt"

  隐性自适应规则:
    标题自适应:
      封面主标题过长:
        第一策略: "缩小字号"
        第二策略: "拆成双排"
        第三策略: "压缩字间距"
        最小字号: "21pt"
      封面副标题过长:
        第一策略: "缩小字号"
        第二策略: "换行"
        最小字号: "15pt"
      正文章节标题过长:
        第一策略: "允许换行"
        第二策略: "保持标题条宽度不变，高度自适应"
        第三策略: "适当缩小字号"
      禁止:
        - "标题超出安全区"
        - "标题被图片覆盖"
        - "标题孤立在页底"

    图片自适应:
      图片随标题移动:
        启用: true
        说明: "当标题因换行、分页或位置调整移动时，其下关联图片作为同一内容组同步移动"
      图片随内容缩放:
        启用: true
        规则:
          - "图片根据当前页剩余高度自动缩放"
          - "产品线稿需优先保证结构细节可读"
          - "操作图需优先保证箭头和编号可读"
          - "回收图标不得非等比缩放"
      空间不足时:
        第一策略: "缩小图片"
        第二策略: "调整图文间距"
        第三策略: "将图文组整体移至下一页"
        第四策略: "拆分周围正文，但不拆分图片说明"

    警告框自适应:
      警告项过多:
        第一策略: "增加警告框高度"
        第二策略: "整体移至下一页"
        第三策略: "拆分为多个警告框，但每个警告项保持完整"
      警告正文过长:
        第一策略: "自然换行"
        第二策略: "增加框高"
        第三策略: "整体移至下一页"
      禁止:
        - "压缩到小于10pt"
        - "警告图标与文字分离"
        - "警告标题单独跨页"

    表格自适应:
      表格列过多:
        第一策略: "按内容调整列宽"
        第二策略: "缩小字号但不得低于8pt"
        第三策略: "改为纵向参数列表"
      表格行过多:
        第一策略: "跨页并重复表头"
        第二策略: "拆分为多个表格"
      禁止:
        - "表格内容超出页边距"
        - "表头单独留在页底"
        - "单元格文字被裁切"

    目录自适应:
      目录行数少:
        策略: "增大行距，最高21pt"
      目录行数多:
        策略: "缩小行距，最低12pt"
      条目过长:
        第一策略: "缩短点线长度"
        第二策略: "条目换行并保持页码右对齐"
        第三策略: "适当缩小字号"
      页码变化:
        策略: "自动更新目录页码"

    页脚自适应:
      邮箱过长:
        第一策略: "保持字号，压缩局部字距"
        第二策略: "缩小字号"
        第三策略: "调整邮箱位置以获得更大空间"
      页码变化:
        策略: "自动更新，保持-01-或- 01 -格式一致"

  模块顺序规范:
    推荐章节顺序:
      - "SAFETY WARNINGS"
      - "SAVE THESE INSTRUCTIONS"
      - "ABOUT PRODUCT"
      - "ASSEMBLY"
      - "OPERATION"
      - "DISPOSAL"
      - "Support / Manufacturer Information"
