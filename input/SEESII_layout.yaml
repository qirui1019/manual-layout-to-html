产品说明书布局规范:
  品牌: "SEESII"
  规范来源: "SEESII说明书规范.pdf"
  文档类型: "产品说明书"
  适用范围:
    - "电动工具说明书"
    - "安全警告型说明书"
    - "操作步骤型说明书"
    - "A5印刷说明书"
  规范版本: "1.0"

  页面基础规范:
    页面尺寸:
      名称: "A5"
      宽度: "148mm"
      高度: "210mm"
      页面方向: "竖向"
      说明: "规范页标注为A5（210*148mm），实际展示为竖向A5，故按宽148mm、高210mm记录"
    页面边距:
      封面:
        上: "10mm"
        下: "10mm"
        左: "10mm"
        右: "10mm"
      内页:
        上: "10mm"
        下: "10mm"
        左: "10mm"
        右: "10mm"
      说明: "第4页标注页边距T/B/R/L均为10mm"
    内容安全区:
      启用: true
      封面:
        上: "10mm"
        下: "10mm"
        左: "10mm"
        右: "10mm"
      内页:
        上: "10mm"
        下: "10mm"
        左: "10mm"
        右: "10mm"
    出血:
      启用: false
      说明: "规范中未明确出血尺寸，默认不启用"
    页面背景:
      默认: "白色"
      装饰元素:
        启用: true
        风格: "黑白灰工业风几何装饰"
        位置:
          - "封面顶部标题背景"
          - "封面底部信息条"
          - "目录页主体浅灰底板"
          - "页眉灰色横条"
          - "页脚装饰条"
          - "页面局部箭头装饰"

  字体规范:
    标题字体:
      字体名称: "Orbitron"
      适用对象:
        - "品牌标识"
        - "封面产品主标题"
        - "封面副标题"
        - "一级标题"
        - "二级标题"
        - "目录标题"
        - "正文页章节标题"
        - "黑底标题条"
    正文字体:
      字体名称: "New Frank"
      适用对象:
        - "正文"
        - "目录条目"
        - "说明文字"
        - "警告内容"
        - "型号"
        - "邮箱"
        - "表格内容"
        - "图注"

    字号体系:
      一级标题:
        字体: "Orbitron Bold"
        字号: "15pt"
        用途:
          - "SAFETY WARNINGS"
          - "ABOUT PRODUCT"
          - "ASSEMBLY"
          - "OPERATION"
          - "DISPOSAL"
      二级标题:
        字体: "Orbitron Bold"
        字号: "12pt"
        用途:
          - "WARNING"
          - "General power tool safety warnings"
          - "Reversing switch lever action"
          - "Speed change"
      三级标题:
        字体: "New Frank Bold"
        字号: "11pt"
        用途:
          - "CAUTION:"
          - "Safety instructions for all operations"
          - "Safety instructions when using long drill bits"
      正文:
        字体: "New Frank Regular"
        字号: "10pt"
      正文加粗:
        字体: "New Frank Bold"
        字号: "10pt"
        用途:
          - "重要提示标签"
          - "警告标题"
          - "参数名称"
          - "联系方式标签"
      目录标题:
        字体: "Orbitron Black"
        字号: "18pt"
        用途:
          - "TABLE OF CONTENTS"
      目录一级条目:
        字体: "New Frank Bold"
        字号: "11pt"
      目录二级条目:
        字体: "New Frank Regular"
        字号: "11pt"
      页眉邮箱:
        字体: "New Frank Bold"
        字号: "10pt"
      页码:
        字体: "New Frank Regular"
        字号: "10pt"

    封面字号:
      品牌标识:
        字体: "Orbitron Black"
        字号: "32pt"
        宽度参考: "50mm"
      产品主标题:
        字体: "Orbitron Black"
        默认字号: "32pt"
        最大字号: "32pt"
        最小字号: "21pt"
        双排标题使用: true
      说明书副标题:
        字体: "Orbitron Bold"
        标注字号: "18pt"
        规范范围: "15pt-17pt"
        说明: "第5页标注为Orbitron Bold 18pt，第4页写副标题最大17pt，实际执行可允许15pt-18pt"
      重要安全说明标题:
        字体: "New Frank Bold"
        字号: "13pt"
      封面说明正文:
        字体: "New Frank Regular"
        字号: "10pt"

  行距规范:
    目录正文行距:
      最小值: "12pt"
      最大值: "21pt"
      调整依据: "根据目录行数调整"
    正文行距:
      最小值: "11pt"
      最大值: "15pt"
      推荐值: "12.5pt"
      调整依据:
        - "正文内容长度"
        - "图片高度"
        - "表格高度"
        - "分页平衡"
    标题与正文间距:
      一级标题后: "约7mm"
      二级标题后: "约3mm"
      内容块之间: "根据版面疏密调整"
      说明: "第8页标注出现7mm、3mm间距"

  颜色与视觉风格:
    主色:
      黑色: "#000000"
      深灰: "#333333"
      中灰: "#999999"
      浅灰: "#EDEDED"
      白色: "#FFFFFF"
    辅助色:
      页眉灰: "#E5E5E5"
      背景浅灰: "#F2F2F2"
      装饰灰: "#D9D9D9"
      表格线黑: "#000000"
    风格关键词:
      - "黑白灰"
      - "工业感"
      - "电动工具"
      - "高对比标题"
      - "几何箭头"
      - "线稿产品图"
      - "硬朗版式"
    装饰规则:
      几何箭头:
        启用: true
        位置:
          - "封面左下区域"
          - "目录页右上页眉"
          - "底部信息条"
        颜色: "浅灰或深灰"
      斜切灰块:
        启用: true
        位置:
          - "封面顶部标题背景右侧"
          - "封面底部信息条"
          - "目录页背景右下角"
      页眉灰条:
        启用: true
        位置: "目录页顶部"
      黑底标题条:
        启用: true
        位置:
          - "正文二级标题"
          - "操作章节标题"
        样式: "黑底白字圆角条"

  封面布局:
    页面类型: "封面"
    页面边距:
      上: "10mm"
      下: "10mm"
      左: "10mm"
      右: "10mm"

    结构顺序:
      - "顶部品牌标识"
      - "产品主标题"
      - "说明书副标题"
      - "分隔线"
      - "重要安全说明"
      - "产品主图"
      - "底部型号与邮箱信息条"

    品牌标识:
      内容: "SEESII POWER TOOLS"
      位置: "页面左上"
      距离上边: "10mm"
      距离左边: "10mm"
      宽度参考: "50mm"
      对齐方式: "左对齐"
      字体: "Orbitron Black"
      字号: "32pt"
      隐性规则:
        - "品牌标识固定在封面左上安全区内"
        - "品牌标识宽度优先保持50mm"
        - "品牌标识不得与产品主标题重叠"
        - "品牌标识与主标题保持同一左对齐基准"
        - "当品牌标识图形不可用时，使用等宽占位保持版式"

    产品主标题:
      示例: "CORDLESS DRILL"
      字体: "Orbitron Black"
      字号: "32pt"
      字号范围: "21pt-32pt"
      对齐方式: "左对齐"
      隐性规则:
        - "主标题宽度不得超出封面安全区"
        - "主标题过长时优先缩小字号"
        - "字号缩小仍无法容纳时允许拆成双排"
        - "双排标题每行字号不得小于21pt"
        - "主标题必须保持封面最高文字层级"
        - "主标题不得小于说明书副标题"

    说明书副标题:
      示例: "INSTRUCTION MANUAL"
      字体: "Orbitron Bold"
      字号范围: "15pt-18pt"
      对齐方式: "左对齐"
      下方分隔线:
        启用: true
        样式: "黑色实线"
        宽度: "约1pt"
        延伸方式: "跟随标题内容区宽度"
      隐性规则:
        - "副标题与主标题保持同一左边界"
        - "副标题宽度随标题区域宽度变化"
        - "副标题下方分隔线不得与重要安全说明重叠"
        - "副标题过长时优先缩小字号，其次换行"

    重要安全说明:
      标题:
        文案: "IMPORTANT SAFETY INSTRUCTIONS:"
        字体: "New Frank Bold"
        字号: "13pt"
      正文:
        字体: "New Frank Regular"
        字号: "10pt"
      内容:
        - "Before initial use, please fully charge the device to ensure proper operation."
        - "Read and understand all instructions carefully before use."
        - "After-Sales Support Email: support@seesiius.com"
      隐性规则:
        - "重要安全说明整体作为一个文本组"
        - "标题与说明正文必须保持同页"
        - "说明正文不得与产品主图重叠"
        - "说明区域高度根据文字行数自动扩展"
        - "邮箱地址不得断裂到难以识别"

    产品主图:
      类型: "产品线稿图"
      内容: "电钻线稿"
      位置: "封面中下部"
      对齐方式: "居中"
      适配方式: "等比例完整显示"
      隐性规则:
        - "产品图为封面核心视觉，应占据中下部主要空间"
        - "产品图需避让上方标题和重要安全说明"
        - "产品图需避让底部型号邮箱信息条"
        - "产品图允许根据标题区域高度自动缩放"
        - "产品图不得裁切"
        - "产品图视觉中心应接近页面中轴"
        - "产品图线稿细节缩放后必须可读"

    底部信息条:
      启用: true
      位置: "页面底部"
      背景: "灰色斜切装饰条"
      内容:
        左侧: "Model: E1313"
        右侧: "Email:support@seesiius.com"
      字体:
        标签: "New Frank Bold"
        内容: "New Frank Regular"
      对齐方式:
        左侧: "左下或居中偏左"
        右侧: "右下"
      隐性规则:
        - "底部信息条固定贴近页面底部安全区"
        - "型号与邮箱左右分布"
        - "信息条不得与产品图重叠"
        - "邮箱过长时优先压缩字距，其次缩小字号"
        - "底部斜切装饰不得影响文字可读性"

  目录页布局:
    页面类型: "目录页"
    页眉:
      启用: true
      高度参考: "20mm"
      背景: "浅灰横条"
      左侧:
        内容: "SEESII POWER TOOLS"
        字体: "Orbitron"
      右侧:
        内容: "support@seesiius.com"
        字体: "New Frank Bold"
        字号: "10pt"
        装饰: "右侧几何箭头"
      隐性规则:
        - "页眉固定在页面上方安全区内"
        - "品牌标识与邮箱左右分布"
        - "邮箱靠右，并需避让箭头装饰"
        - "页眉与目录标题之间保持清晰间距"
        - "页眉不得与目录主体背景混淆"

    目录标题:
      文案: "TABLE OF CONTENTS"
      字体: "Orbitron Black"
      字号: "18pt"
      对齐方式: "左对齐"
      位置: "页眉下方"

    目录条目:
      一级条目:
        字体: "New Frank Bold"
        字号: "11pt"
        示例:
          - "SAFETY WARNINGS"
          - "SAVE THESE INSTRUCTIONS"
          - "ABOUT PRODUCT"
          - "ASSEMBLY"
          - "OPERATION"
          - "DISPOSAL"
      二级条目:
        字体: "New Frank Regular"
        字号: "11pt"
        缩进: "相对一级条目缩进"
        示例:
          - "General power tool safety warnings"
          - "Cordless driver drill safety warnings"
          - "Important safety instructions for battery"
          - "Assembly Diagram"
          - "Parts List"
          - "Specification"
      页码:
        字体: "New Frank Regular"
        字号: "11pt"
        对齐方式: "右对齐"
        格式: "两位数字"
        示例: "01"
      引导线:
        样式: "黑色点线"
        起点: "目录条目文本之后"
        终点: "页码之前"
        长度: "随条目文字长度自适应"
      行距:
        范围: "12pt-21pt"
        根据目录行数调整: true

    目录背景:
      启用: true
      类型: "浅灰内容底板"
      位置: "目录主体区域"
      右下角斜切: true
      隐性规则:
        - "背景底板应覆盖目录主体内容"
        - "背景底板不得压住页眉"
        - "目录内容不得超出背景底板安全范围"
        - "右下角斜切装饰不得影响目录阅读"

    隐性规则:
      - "一级目录必须比二级目录更醒目"
      - "二级目录必须归属于上方最近一级目录"
      - "页码必须右对齐形成统一视觉边界"
      - "点线长度随条目文字长度自适应"
      - "目录行数多时优先压缩行距，最低不低于12pt"
      - "目录行数少时可增大行距，最高不超过21pt"
      - "目录不得出现孤立页码"
      - "目录页码必须与正文实际页码一致"

  内页通用布局:
    页面类型: "正文内页"
    页眉:
      启用: false
      说明: "多数正文页未采用固定页眉；目录页有独立页眉"
      可选页眉:
        启用条件: "章节页或品牌强化页"
        内容:
          左侧: "品牌标识"
          右侧: "邮箱或章节标题"

    页脚:
      启用: true
      页码:
        位置: "页面底部居中"
        字体: "New Frank Regular"
        字号: "10pt"
        格式: "-{两位页码}-"
        示例:
          - "-01-"
          - "-04-"
          - "-05-"
      邮箱:
        内容: "support@seesiius.com"
        字体: "New Frank Regular"
        字号: "10pt"
        位置:
          可选:
            - "页面底部右侧"
            - "封面底部信息条右侧"
            - "目录页页眉右侧"
      隐性规则:
        - "页码固定在页面底部安全区内"
        - "页码不得被正文、图片、表格覆盖"
        - "页码格式应全书一致"
        - "如同页出现邮箱，邮箱与页码需保持足够间距"
        - "正文内容必须避让页脚区域"

  正文标题层级:
    一级标题:
      字体: "Orbitron Bold"
      字号: "15pt"
      常见样式:
        - "普通黑色大写标题"
        - "章节开头标题"
      示例:
        - "SAFETY WARNINGS"
        - "DISPOSAL"
      与下方内容间距: "约7mm"
      隐性规则:
        - "一级标题不得孤立出现在页底"
        - "一级标题后至少应跟随一段正文、一个二级标题或一个完整内容块"
        - "一级标题应作为章节视觉锚点"
        - "一级标题可根据章节结构另起页面"

    二级标题:
      字体: "Orbitron Bold"
      字号: "12pt"
      常见样式:
        - "普通黑色标题"
        - "黑底白字圆角标题条"
      示例:
        - "WARNING"
        - "General power tool safety warnings"
        - "Reversing switch lever action"
        - "Speed change"
      与正文间距: "约3mm"
      隐性规则:
        - "二级标题常用于安全提示或操作小节"
        - "黑底标题条宽度根据文字长度自适应"
        - "二级标题与下方正文、警告框或图片保持视觉绑定"
        - "二级标题不得与其正文跨页分离"

    三级标题:
      字体: "New Frank Bold"
      字号: "11pt"
      示例:
        - "CAUTION:"
        - "Safety instructions for all operations"
      隐性规则:
        - "三级标题通常作为正文局部强调"
        - "三级标题必须靠近其说明正文"
        - "三级标题不得单独位于页尾"

    正文:
      字体: "New Frank Regular"
      字号: "10pt"
      行距:
        推荐值: "12.5pt"
        范围: "11pt-15pt"
      对齐方式: "左对齐"
      隐性规则:
        - "正文行宽不得超出安全区"
        - "正文长句自然换行"
        - "重要词可使用New Frank Bold 10pt"
        - "正文不得覆盖图片、表格、页码或邮箱"

  组件布局:
    安全警告正文:
      页面示例: "第8页 SAFETY WARNINGS"
      结构:
        - "一级标题"
        - "警告说明段落"
        - "WARNING标题"
        - "二级标题"
        - "编号安全条目"
      字体:
        一级标题: "Orbitron Bold 15pt"
        二级标题: "Orbitron Bold 12pt"
        警告标题: "New Frank Bold 11pt"
        正文: "New Frank Regular 10pt"
      隐性规则:
        - "安全警告章节应出现在操作说明之前"
        - "警告标题与警告正文必须保持相邻"
        - "安全说明正文可跨页，但标题不得孤立"
        - "列表编号不得单独留在页尾"

    警告框:
      页面示例:
        - "第14页 Reversing switch lever action"
        - "第15页 Speed change"
      布局类型: "虚线圆角警告框"
      外框:
        样式: "虚线边框"
        颜色: "黑色"
        圆角: "较大圆角"
        内边距: "约5mm"
        背景: "白色或极浅灰"
      警告项:
        图标: "三角感叹号"
        标题:
          文案示例: "CAUTION:"
          字体: "New Frank Bold"
          字号: "11pt"
        正文:
          字体: "New Frank Regular"
          字号: "10pt"
      隐性规则:
        - "警告图标、警告标题、警告正文组成一个警告项"
        - "同一警告框内可包含多个警告项"
        - "警告框宽度随正文内容区宽度自适应"
        - "警告框高度随警告项数量自动扩展"
        - "警告框应尽量保持整体同页"
        - "警告框不得作为页面最后一个孤立元素"
        - "警告框应出现在相关操作说明之前"
        - "警告框内多条警告之间应保持一致间距"
        - "警告图标不得与对应文字分离"

    操作步骤:
      页面示例:
        - "第14页 Reversing switch lever action"
        - "第15页 Speed change"
      步骤标题:
        字体: "New Frank Bold"
        字号: "10pt"
        格式示例:
          - "1."
          - "2."
          - "3."
      步骤正文:
        字体: "New Frank Regular"
        字号: "10pt"
      隐性规则:
        - "步骤编号与步骤正文必须保持同组"
        - "步骤说明应位于相关图片之前或附近"
        - "操作顺序不得因分页而混乱"
